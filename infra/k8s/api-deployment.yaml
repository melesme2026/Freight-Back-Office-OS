apiVersion: apps/v1
kind: Deployment
metadata:
  name: freight-api
  labels:
    app: freight-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freight-api
  template:
    metadata:
      labels:
        app: freight-api
    spec:
      containers:
        - name: api
          image: freight-back-office-os/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "staging"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: freight-api-secrets
                  key: database-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: freight-api-secrets
                  key: celery-broker-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: freight-api-secrets
                  key: celery-result-backend
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: freight-api-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: freight-api-secrets
                  key: secret-key
            - name: STORAGE_LOCAL_ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: freight-api-config
                  key: storage-local-root-path
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: freight-api
spec:
  selector:
    app: freight-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000