apiVersion: apps/v1
kind: Deployment
metadata:
  name: freight-worker
  labels:
    app: freight-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freight-worker
  template:
    metadata:
      labels:
        app: freight-worker
    spec:
      containers:
        - name: worker
          image: freight-back-office-os/worker:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.workers.celery_app.celery_app
            - worker
            - --loglevel=info
          env:
            - name: APP_ENV
              value: "staging"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: freight-worker-secrets
                  key: database-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: freight-worker-secrets
                  key: celery-broker-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: freight-worker-secrets
                  key: celery-result-backend
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: freight-worker-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: freight-worker-secrets
                  key: secret-key
            - name: STORAGE_LOCAL_ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: freight-worker-config
                  key: storage-local-root-path
---
