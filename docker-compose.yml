version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: freight_back_office_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: freight_back_office_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freight_back_office_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: freight_back_office_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: freight_back_office_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: >
      sh -c "cd /app/backend && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: freight_back_office_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: >
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app worker --loglevel=info"

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: freight_back_office_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: >
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app beat --loglevel=info"

volumes:
  postgres_data:
  redis_data: