services:
  postgres:
    image: postgres:16
    container_name: freight_back_office_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: freight_back_office_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freight_back_office_os"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: freight_back_office_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: freight_back_office_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: local
      DATABASE_URL_OVERRIDE: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      REDIS_URL_OVERRIDE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      sh -c "cd /app/backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: freight_back_office_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: local
      DATABASE_URL_OVERRIDE: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      REDIS_URL_OVERRIDE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: >
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app worker --loglevel=info"

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: freight_back_office_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: local
      DATABASE_URL_OVERRIDE: postgresql+psycopg://postgres:postgres@postgres:5432/freight_back_office_os
      REDIS_URL_OVERRIDE: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: >
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app beat --loglevel=info"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-}
        NEXT_PUBLIC_API_VERSION_PREFIX: ${NEXT_PUBLIC_API_VERSION_PREFIX-/api/v1}
    container_name: freight_back_office_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL-}
      NEXT_PUBLIC_API_VERSION_PREFIX: ${NEXT_PUBLIC_API_VERSION_PREFIX-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    # Single public entrypoint for browser traffic in Docker: http://localhost -> nginx
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    container_name: freight_back_office_nginx
    restart: unless-stopped
    environment:
      PORT: 80
      API_UPSTREAM_HOST: api
      API_UPSTREAM_PORT: 8000
      WEB_UPSTREAM_HOST: web
      WEB_UPSTREAM_PORT: 3000
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
