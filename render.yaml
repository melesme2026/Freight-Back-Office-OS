services:
  - type: keyvalue
    name: fbos-staging-redis
    region: oregon
    plan: starter
    ipAllowList: []

  - type: pserv
    name: fbos-staging-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/api.Dockerfile
    dockerContext: .
    dockerCommand: >-
      sh -c "cd /app/backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL_OVERRIDE
        fromDatabase:
          name: fbos-staging-postgres
          property: connectionString
      - key: REDIS_URL_OVERRIDE
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: WEB_APP_BASE_URL
        value: https://staging.freightbackofficeos.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://staging.freightbackofficeos.com
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: /app/data/sandbox/uploaded-docs
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: AI_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: EMAIL_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: none
      - key: BILLING_ENABLED
        value: "false"

  - type: worker
    name: fbos-staging-worker
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/worker.Dockerfile
    dockerContext: .
    dockerCommand: >-
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app worker --loglevel=info"
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          type: pserv
          name: fbos-staging-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL_OVERRIDE
        fromDatabase:
          name: fbos-staging-postgres
          property: connectionString
      - key: REDIS_URL_OVERRIDE
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: /app/data/sandbox/uploaded-docs
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: AI_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: EMAIL_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: none
      - key: BILLING_ENABLED
        value: "false"

  - type: worker
    name: fbos-staging-beat
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/worker.Dockerfile
    dockerContext: .
    dockerCommand: >-
      sh -c "cd /app/backend && celery -A app.workers.celery_app.celery_app beat --loglevel=info"
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          type: pserv
          name: fbos-staging-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL_OVERRIDE
        fromDatabase:
          name: fbos-staging-postgres
          property: connectionString
      - key: REDIS_URL_OVERRIDE
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: fbos-staging-redis
          property: connectionString
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: /app/data/sandbox/uploaded-docs
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: AI_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: EMAIL_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: none
      - key: BILLING_ENABLED
        value: "false"

  - type: pserv
    name: fbos-staging-web
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/web.Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ""
      - key: NEXT_PUBLIC_API_VERSION_PREFIX
        value: /api/v1

  - type: web
    name: fbos-staging-nginx
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/nginx.Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: API_UPSTREAM_HOST
        fromService:
          type: pserv
          name: fbos-staging-api
          property: host
      - key: API_UPSTREAM_PORT
        fromService:
          type: pserv
          name: fbos-staging-api
          property: port
      - key: WEB_UPSTREAM_HOST
        fromService:
          type: pserv
          name: fbos-staging-web
          property: host
      - key: WEB_UPSTREAM_PORT
        fromService:
          type: pserv
          name: fbos-staging-web
          property: port

databases:
  - name: fbos-staging-postgres
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: freight_back_office_os
    user: freight_back_office_os
    ipAllowList: []
