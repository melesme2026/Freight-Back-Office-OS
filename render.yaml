services:
  - type: web
    name: fbos-nginx
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/nginx.Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: API_UPSTREAM_HOST
        fromService:
          type: pserv
          name: fbos-api
          property: host
      - key: API_UPSTREAM_PORT
        fromService:
          type: pserv
          name: fbos-api
          property: port
      - key: WEB_UPSTREAM_HOST
        fromService:
          type: pserv
          name: fbos-web
          property: host
      - key: WEB_UPSTREAM_PORT
        fromService:
          type: pserv
          name: fbos-web
          property: port

  - type: pserv
    name: fbos-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/api.Dockerfile
    dockerContext: .
    preDeployCommand: alembic upgrade head
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL_OVERRIDE
        fromDatabase:
          name: fbos-postgres
          property: connectionString
      - key: WEB_APP_BASE_URL
        value: https://fbos-nginx.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: '["https://fbos-nginx.onrender.com"]'
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_ROOT
        value: /app/data/sandbox/uploaded-docs
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: AI_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: EMAIL_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: none
      - key: BILLING_ENABLED
        value: "false"
      - key: APP_BILLING_MODE
        value: pilot

  - type: pserv
    name: fbos-web
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./infra/docker/web.Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: ""
      - key: NEXT_PUBLIC_API_VERSION_PREFIX
        value: /api/v1
      - key: NEXT_PUBLIC_BILLING_MODE
        value: pilot

databases:
  - name: fbos-postgres
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: freight_back_office_os
    user: freight_back_office_os
    ipAllowList: []